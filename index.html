<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEG — Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- Font Awesome Free -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- MODAL: INPUT NAMA -->
<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <div class="modal-logo">Kyy | Meg</div>
    <div class="modal-sub">music player</div>
    <p class="modal-desc">Siapa namamu?</p>
    <input type="text" id="nameInput" class="modal-input" placeholder="masukkan nama kamu..." maxlength="24" autocomplete="off" />
    <button class="modal-btn" id="nameSubmit">Masuk <i class="fa-solid fa-arrow-right"></i></button>
  </div>
</div>

<!-- APP -->
<div class="app" id="appWrapper" style="display:none;">

  <!-- HEADER -->
  <header>
    <a class="logo" href="#">
      MEG
      <span>music player</span>
    </a>
    <div class="header-right">
      <span class="status-tag" id="statusTag">idle</span>
      <!-- NAV TABS -->
      <button class="nav-tab active" id="tabSearch"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
      <button class="nav-tab" id="tabLikes"><i class="fa-solid fa-heart"></i> Likes</button>
      <button class="nav-tab" id="tabPlaylist"><i class="fa-solid fa-list"></i> Playlist</button>
      <button class="theme-btn" id="themeBtn" title="Toggle theme"><i class="fa-solid fa-circle-half-stroke"></i></button>
      <div class="user-badge" id="userBadge"><i class="fa-solid fa-user"></i> —</div>
    </div>
  </header>

  <!-- SEARCH SECTION -->
  <div class="search-section" id="searchSection">
    <span class="search-label">Search</span>
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="artist, song, album..." autocomplete="off" />
      <button class="search-btn" id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main id="mainContent">
    <div class="state-msg">
      <span class="big">Listen.</span>
      SEARCH TO START — POWERED BY YOUTUBE
    </div>
  </main>

</div>

<!-- PLAYER (fixed bottom) -->
<div class="player hidden" id="player">
  <div class="progress-track" id="progressTrack">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="player-main">
    <img class="player-thumb" id="playerThumb" src="" alt="" />
    <div class="player-info">
      <div class="player-title" id="playerTitle">—</div>
      <div class="player-channel" id="playerChannel">—</div>
    </div>
    <button class="like-btn" id="likeBtn" title="Like"><i class="fa-solid fa-heart"></i></button>
    <div class="player-controls">
      <button class="ctrl-btn" id="prevBtn" title="Previous"><i class="fa-solid fa-backward-step"></i></button>
      <button class="ctrl-btn play-main" id="playPauseBtn"><i class="fa-solid fa-play" id="playIcon"></i></button>
      <button class="ctrl-btn" id="nextBtn" title="Next"><i class="fa-solid fa-forward-step"></i></button>
    </div>
    <div class="player-time" id="playerTime">0:00 / 0:00</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<audio id="audioEl"></audio>

<!-- FIREBASE -->
<script type="module" src="app.js"></script>
</body>
</html>
